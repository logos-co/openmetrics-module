che...\nthis path will be fetched (421.8 KiB download, 1.1 MiB unpacked):\n  /nix/store/fa3yzwgk55zfnb7jy608j55qlmxvagyb-logos-package-manager-cli-1.0.0\ncopying path '/nix/store/fa3yzwgk55zfnb7jy608j55qlmxvagyb-logos-package-manager-cli-1.0.0' from 'https://logos-co.cachix.org'...\n", "note": ""}]}, {"md": "### 3.3 Seed the modules directory with the capability module\n\n```bash\nmkdir -p modules\ncp -RL ./logos/modules/. ./modules/\n\n```", "execs": [{"kind": "run", "cmd": "mkdir -p modules\ncp -RL ./logos/modules/. ./modules/\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.4 Install the scraper\n\n```bash\n./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file openmetrics-lgx/*.lgx\n```", "execs": [{"kind": "run", "cmd": "./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file openmetrics-lgx/*.lgx", "status": "pass", "exit_code": 0, "output": "Installing from file: openmetrics-lgx/logos-openmetrics-module-lib.lgx... done\nInstalled to: ./modules\n", "note": ""}]}, {"md": "### 3.5 Install temperature_module\n\n```bash\n./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file temperature-lgx/*.lgx\n```", "execs": [{"kind": "run", "cmd": "./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file temperature-lgx/*.lgx", "status": "pass", "exit_code": 0, "output": "Installing from file: temperature-lgx/logos-temperature_module-module-lib.lgx... done\nInstalled to: ./modules\n", "note": ""}]}, {"md": "### 3.6 Install request_counter_module\n\n```bash\n./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file request-counter-lgx/*.lgx\n```", "execs": [{"kind": "run", "cmd": "./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file request-counter-lgx/*.lgx", "status": "pass", "exit_code": 0, "output": "Installing from file: request-counter-lgx/logos-request_counter_module-module-lib.lgx... done\nInstalled to: ./modules\n", "note": ""}]}, {"md": "### 3.7 Confirm all three are installed\n\n```bash\n./lgpm/bin/lgpm --modules-dir ./modules list\n```", "execs": [{"kind": "run", "cmd": "./lgpm/bin/lgpm --modules-dir ./modules list", "status": "pass", "exit_code": 0, "output": "Found 4 installed module(s):\n\nNAME                           VERSION         TYPE       CATEGORY       \n----------------------------------------------------------------------\ncapability_module              1.0.0           core       security       \nopenmetrics                    0.1.0           core       monitoring     \nrequest_counter_module         1.0.0           core       monitoring     \ntemperature_module             1.0.0           core       monitoring     \n", "note": ""}]}, {"md": "## Step 4: Run it and scrape /metrics\n\nStart the daemon, load the providers and the scraper, then `start` the\nscraper with a config JSON naming the two modules to scrape. A single\n`curl` then drives one `collectMetrics()` call into each provider \u2014 from the\nHTTP server thread \u2014 and returns the aggregated OpenMetrics document.", "execs": []}, {"md": "### 4.1 Start the daemon\n\n```bash\nlogoscore -D -m ./modules > logs.txt &\n```", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore -D -m ./modules > logs.txt 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 3\n```", "execs": [{"kind": "run", "cmd": "sleep 3", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.2 Load the providers\n\n```bash\nlogoscore load-module temperature_module\nlogoscore load-module request_counter_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore load-module temperature_module\n./logos/bin/logoscore load-module request_counter_module\n", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[],\"module\":\"temperature_module\",\"status\":\"ok\"}\n{\"dependencies_loaded\":[],\"module\":\"request_counter_module\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.3 Load the scraper\n\n```bash\nlogoscore load-module openmetrics\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore load-module openmetrics", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[],\"module\":\"openmetrics\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.4 Start the OpenMetrics server\n\n`start` takes one config JSON: the port, and the list of modules to\nscrape. Passed as a single argument so the JSON reaches the module\nintact.\n\n```bash\nlogoscore call openmetrics start '{\"port\":9099,\"modules\":[\"temperature_module\",\"request_counter_module\"]}'\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call openmetrics start '{\"port\":9099,\"modules\":[\"temperature_module\",\"request_counter_module\"]}'\n", "status": "pass", "exit_code": 0, "output": "{\"method\":\"start\",\"module\":\"openmetrics\",\"result\":1,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 1\n```", "execs": [{"kind": "run", "cmd": "sleep 1", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.5 Scrape /metrics\n\nThe request handler runs on the libmicrohttpd thread; for each configured\nmodule it calls `collectMetrics()` through the bound `metrics_source`\ninterface, and the SDK marshals that call onto the module's owner thread.\nEvery series carries a `module=\"<name>\"` label, counters render with the\nOpenMetrics `_total` sample, and the document ends with `# EOF`:\n\n```bash\ncurl http://127.0.0.1:9099/metrics\n```", "execs": [{"kind": "run", "cmd": "curl -s --max-time 15 http://127.0.0.1:9099/metrics", "status": "pass", "exit_code": 0, "output": "# HELP http_requests Total HTTP requests handled\n# TYPE http_requests counter\nhttp_requests_total{module=\"request_counter_module\",method=\"GET\"} 7\n# HELP inflight_requests Requests currently in flight\n# TYPE inflight_requests gauge\ninflight_requests{module=\"request_counter_module\"} 3\n# HELP room_temperature_celsius Current room temperature\n# TYPE room_temperature_celsius gauge\nroom_temperature_celsius{module=\"temperature_module\",sensor=\"core\"} 21\n# HELP sensor_readings Total sensor readings taken\n# TYPE sensor_readings counter\nsensor_readings_total{module=\"temperature_module\"} 1\n# EOF\n", "note": ""}]}, {"md": "### 4.6 Check /health\n\n```bash\ncurl http://127.0.0.1:9099/health\n```", "execs": [{"kind": "run", "cmd": "curl -s --max-time 5 http://127.0.0.1:9099/health", "status": "pass", "exit_code": 0, "output": "ok\n", "note": ""}]}, {"md": "### 4.7 getInfo reports what it's serving\n\n`getInfo()` returns its status as a JSON string, so `logoscore`\ndelivers it as an escaped string inside the `result` field.\n\n```bash\nlogoscore call openmetrics getInfo\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call openmetrics getInfo", "status": "pass", "exit_code": 0, "output": "{\"method\":\"getInfo\",\"module\":\"openmetrics\",\"result\":\"{\\\"modules\\\":[\\\"temperature_module\\\",\\\"request_counter_module\\\"],\\\"port\\\":9099,\\\"running\\\":true}\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.8 Stop the server\n\n```bash\nlogoscore call openmetrics stop\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call openmetrics stop", "status": "pass", "exit_code": 0, "output": "{\"method\":\"stop\",\"module\":\"openmetrics\",\"result\":1,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.9 Stop the daemon\n\n```bash\nlogoscore stop\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 2\n```", "execs": [{"kind": "run", "cmd": "sleep 2", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.10 Confirm the daemon has stopped\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status || true", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"instance_id\":\"e2c498923dce\",\"status\":\"not_running\",\"version\":\"1.0\"},\"modules\":[],\"rpc_error\":\"core_service not reachable\"}\n", "note": ""}]}, {"md": "## Recap\n\n| Module | Implements | In the scrape |\n| ------ | ---------- | ------------- |\n| `temperature_module` | `collectMetrics()` \u2192 gauge + counter | `room_temperature_celsius{\u2026}`, `sensor_readings_total{\u2026}` |\n| `request_counter_module` | `collectMetrics()` \u2192 counter + gauge | `http_requests_total{\u2026}`, `inflight_requests{\u2026}` |\n| `openmetrics` (this repo) | `start`/`stop`/`getInfo`/`scrape` + HTTP server | aggregates both, serves `/metrics` |\n\nThe two counters tick on every scrape (`sensor_readings_total`,\n`http_requests_total`), so re-running `curl` shows them climb. Each\n`collectMetrics()` call happened on the HTTP server thread and was marshaled\nonto the target module's owner thread by the SDK \u2014 which is what lets the\nscraper stay pure C++. A green run is end-to-end evidence that the\n`openmetrics` module on this commit aggregates and serves correctly.", "execs": []}]}]}</script>
<script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
</body>
</html>
